<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Playground</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-2xl font-bold mb-4 text-center">Financial Playground</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <div>
        <label class="block text-sm font-medium">Monthly Income</label>
        <input id="income" type="number" value="5000" class="mt-1 w-full border rounded p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium">Monthly Expenses (non-housing)</label>
        <input id="expenses" type="number" value="2000" class="mt-1 w-full border rounded p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium">Monthly Rent (no house)</label>
        <input id="rent" type="number" value="1500" class="mt-1 w-full border rounded p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium">House Price</label>
        <input id="housePrice" type="number" value="350000" class="mt-1 w-full border rounded p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium">Down Payment %</label>
        <input id="downPayment" type="number" value="20" class="mt-1 w-full border rounded p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium">Mortgage Rate %</label>
        <input id="mortgageRate" type="number" value="4" class="mt-1 w-full border rounded p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium">Appreciation %/yr</label>
        <input id="appreciation" type="number" value="3" class="mt-1 w-full border rounded p-2" />
      </div>
      <div>
        <label class="block text-sm font-medium">Years</label>
        <input id="years" type="number" value="30" class="mt-1 w-full border rounded p-2" />
      </div>
    </div>
    <button id="plotBtn" class="bg-blue-500 text-white px-4 py-2 rounded mb-4">Plot</button>
    <canvas id="chart" class="w-full h-64"></canvas>
  </div>
  <script src="app.js"></script>
</body>
</html>
